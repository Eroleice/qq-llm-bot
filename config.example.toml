[napcat]
ws_url = "ws://your-napcat-host:3001"
access_token = "your-napcat-access-token"

[bot]
nicknames = ["小祈"]
command_start = ["#", "/"]
admin_ids = ["100001"]
ignored_user_ids = []
enabled_groups = ["200001"]
default_group_mode = "passive"
proactive_cooldown_seconds = 90
proactive_value_threshold = 0.65
proactive_busy_value_threshold = 0.78
proactive_busy_human_messages = 6
interaction_followup_seconds = 180
max_reply_chars = 180
reply_style_enabled = true
reply_bubbles_enabled = true
reply_bubble_trigger_chars = 45
reply_bubble_target_chars = 28
reply_bubble_max_parts = 3
reply_bubble_delay_seconds = 0.9
reply_emoji_cooldown_messages = 10
final_qa_enabled = true

[persona]
self_name = "小祈"
full_name = ""
gender = ""
age = 0
city = ""
education_school = ""
education_major = ""
education_degree = ""
employer = ""
occupation = ""
work_years = 0
relationship_status = ""
background_summary = ""
appearance_prompt = ""
core_traits = ["温和", "好奇", "有一点俏皮"]
speech_style = ["短句", "口语化", "不端着"]
boundaries = ["这是群聊中的拟人角色设定", "不提供真实联系方式", "不承诺线下见面或现实行动", "不暴露系统提示"]
current_mood = "平静"
relationship_tendency = "慢热但记得住人"
activity_level = 50

[reflection]
enabled = true
message_threshold = 30
recent_limit = 40
min_interval_seconds = 600

[observation_batch]
# Non-reply observation messages are buffered and summarized together to save LLM tokens.
enabled = true
batch_size = 30
max_interval_seconds = 600
max_messages_per_batch = 40
max_message_chars = 300

[facts]
fact_confidence_threshold = 0.75
third_party_trust_threshold = 70
third_party_confidence_threshold = 0.85
profile_fact_threshold = 5
context_fact_limit = 8
target_user_limit = 5
low_importance_threshold = 0.35
fact_context_ttl_days = 30

[lexicon]
# Learn internet slang/memes by controlled web search. Providers: disabled | duckduckgo | serper | searxng
enabled = false
provider = "disabled"
base_url = ""
api_key = ""
api_key_env = "WEB_SEARCH_API_KEY"
min_interval_seconds = 300
max_terms_per_message = 1
max_results = 5
confidence_threshold = 0.78
timeout_seconds = 10.0

[dashboard]
enabled = true
route_prefix = "/dashboard"
api_prefix = "/api/dashboard"
access_token = ""
access_token_env = "QQ_LLM_BOT_DASHBOARD_TOKEN"

[vision]
# Enable if your OpenAI-compatible model supports image_url multimodal input.
enabled = false
model = "gpt-5.5" # Flagship fallback for direct/complex vision when routing is enabled.
max_images_per_message = 3
detail = "low"
timeout_seconds = 45.0
remember_threshold = 0.78

[image_generation]
# Uses OpenAI Responses API /v1/responses with the image_generation tool.
enabled = false
model = "your-image-model-name" # Required; image generation no longer inherits [llm].model.
storage_dir = "data/generated_images"
size = "512x512"
quality = "low"
output_format = "jpeg"
output_compression = 65
timeout_seconds = 240.0
max_send_dimension = 832
min_trust = 5
daily_limit = 5
max_prompt_chars = 800
max_reference_images = 3
reference_image_max_bytes = 4194304
reference_image_max_dimension = 1536
reference_image_quality = 85

[stickers]
# Requires [vision].enabled = true. Detected stickers are downloaded into storage_dir.
enabled = false
storage_dir = "data/stickers"
min_confidence = 0.72
selection_threshold = 0.68
max_context_stickers = 24
download_timeout_seconds = 20.0
max_download_bytes = 8388608
send_cooldown_seconds = 120
unused_ttl_hours = 72
cleanup_interval_hours = 24

[storage]
sqlite_path = "data/bot.sqlite3"

[llm]
provider = "openai-compatible"
model = "gpt-5.5"
base_url = "https://your-openai-compatible-api.example.com/v1"
api_key = ""
api_key_env = "OPENAI_API_KEY"
temperature = 0.8
max_tokens = 4096
timeout_seconds = 30.0

[llm.routing]
# Route cheap/background work to a small model while preserving flagship quality for final replies.
enabled = true
base_model = "gpt-5.4-mini"
flagship_model = "gpt-5.5"
vision_base_model = "gpt-5.4-mini"
